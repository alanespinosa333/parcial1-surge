name: Deploy to Surge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g surge

      - run: surge ./ TU-NOMBRE.surge.sh --token ${{ secrets.SURGE_TOKEN }}